<main>
  <section
    id="reels"
    aria-labelledby="reels-heading"
    aria-describedby="results-announcer"
  >
    <h2 id="reels-heading">Reels</h2>
    <section aria-labelledby="reel-1-heading">
      <h3 id="reel-1-heading">Reel 1</h3>
      <p>Instant Noodles</p> </section>

    <section aria-labelledby="reel-2-heading">
      <h3 id="reel-2-heading">Reel 2</h3>
      <p>Coffee</p>
    </section>

    <section aria-labelledby="reel-3-heading">
      <h3 id="reel-3-heading">Reel 3</h3>
      <p>Laundry Quarters</p>
    </section>
  </section>

  <aside id="controls" aria-labelledby="controls-heading">
    <h2 id="controls-heading">Controls</h2>
    <button type="button" aria-label="Spin the slot machine">
      Spin
    </button>
    <button
      type="button"
      aria-pressed="false"
      aria-label="Toggle game sound"
    >
      Mute
    </button>
  </aside>

  <section
    id="results-announcer"
    aria-live="polite"
    aria-atomic="true"
    aria-labelledby="results-heading"
  >
    <h2 id="results-heading">Results</h2>
    <p>No spin yet.</p>
  </section>
</main>
