# Structural logic: this workflow installs dependencies once, then runs ESLint and Prettier as separate
# quality gates so code-quality failures and formatting failures stay explicit, fast to diagnose, and DRY.

name: Clean Code CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  lint-and-format:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format:check
