<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slot Machine UI</title>
  <style>
    :root {
      --bg: #111111;
      --panel: #1a1a1a;
      --surface: #222222;
      --border: #f5f5f5;
      --text: #f5f5f5;
      --muted: #cfcfcf;
      --accent: #ffffff;
      --gap: 1rem;
      --radius: 0.5rem;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 1.5rem;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.5 Arial, sans-serif;
    }

    header,
    main,
    #reels,
    #controls {
      width: 100%;
    }

    header {
      margin-bottom: 1.5rem;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 1.75rem;
      letter-spacing: 0.04em;
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 3fr) minmax(16rem, 1fr);
      gap: 1.5rem;
      align-items: start;
    }

    #reels {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--gap);
      padding: var(--gap);
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: var(--radius);
    }

    .reel {
      display: grid;
      grid-template-rows: repeat(5, minmax(4rem, 1fr));
      gap: 0.75rem;
    }

    .symbol-slot {
      display: grid;
      place-items: center;
      min-height: 4rem;
      padding: 0.75rem;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 0.375rem;
      color: var(--text);
      font-size: 1.125rem;
      font-weight: 700;
      text-align: center;
    }

    #controls {
      display: grid;
      gap: 0.75rem;
      padding: var(--gap);
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: var(--radius);
    }

    #controls button {
      width: 100%;
      padding: 0.875rem 1rem;
      border: 2px solid var(--border);
      border-radius: 0.375rem;
      background: transparent;
      color: var(--accent);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    #controls p {
      margin: 0.25rem 0 0;
      color: var(--muted);
    }

    @media (max-width: 720px) {
      main {
        grid-template-columns: 1fr;
      }

      #reels {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Slot Machine</h1>
  </header>

  <main>
    <section id="reels" aria-label="Slot machine reels" aria-live="polite">
      <div class="reel" aria-label="Reel 1">
        <div class="symbol-slot" aria-label="Reel 1, slot 1">7</div>
        <div class="symbol-slot" aria-label="Reel 1, slot 2">BAR</div>
        <div class="symbol-slot" aria-label="Reel 1, slot 3">A</div>
        <div class="symbol-slot" aria-label="Reel 1, slot 4">K</div>
        <div class="symbol-slot" aria-label="Reel 1, slot 5">Q</div>
      </div>

      <div class="reel" aria-label="Reel 2">
        <div class="symbol-slot" aria-label="Reel 2, slot 1">Q</div>
        <div class="symbol-slot" aria-label="Reel 2, slot 2">7</div>
        <div class="symbol-slot" aria-label="Reel 2, slot 3">BAR</div>
        <div class="symbol-slot" aria-label="Reel 2, slot 4">A</div>
        <div class="symbol-slot" aria-label="Reel 2, slot 5">K</div>
      </div>

      <div class="reel" aria-label="Reel 3">
        <div class="symbol-slot" aria-label="Reel 3, slot 1">K</div>
        <div class="symbol-slot" aria-label="Reel 3, slot 2">A</div>
        <div class="symbol-slot" aria-label="Reel 3, slot 3">7</div>
        <div class="symbol-slot" aria-label="Reel 3, slot 4">BAR</div>
        <div class="symbol-slot" aria-label="Reel 3, slot 5">Q</div>
      </div>
    </section>

    <aside id="controls" aria-label="Slot machine controls">
      <button type="button" aria-label="Spin reels">Spin</button>
      <button type="button" aria-label="Reset machine">Reset</button>
      <p aria-live="polite" aria-label="Game status">Ready to play.</p>
    </aside>
  </main>
</body>
</html>
